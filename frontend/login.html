<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Manrope:wght@400;500;600;700;800&display=swap" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
    <link rel="stylesheet" href="/style.css" />
</head>
<body class="auth-page">
    <div class="page-loader">
        <div class="page-loader-box animate__animated animate__pulse animate__infinite">
            <span class="page-loader-dot"></span>
            <span class="page-loader-text">Loading</span>
        </div>
    </div>
    <section class="auth-form-container">
        <div class="auth-form-wrapper">
            <div class="form-header">
                <h1>Login</h1>
                <p>Enter username and password.</p>
            </div>
            {{error}}
            <form class="auth-form" method="post" action="/login">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input id="username" name="username" autocomplete="username" />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" type="password" name="password" autocomplete="current-password" />
                </div>
                <button type="submit" class="submit-btn">Sign in</button>
            </form>
        </div>
    </section>
</body>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
(() => {
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    const message = params.get('message');
    const text = error || message;
    if (text) {
        alert(text);
        params.delete('error');
        params.delete('message');
        const next = params.toString();
        const url = `${window.location.pathname}${next ? `?${next}` : ''}${window.location.hash}`;
        window.history.replaceState({}, '', url);
    }

    const loader = document.querySelector('.page-loader');
    window.addEventListener('load', () => {
        if (!loader) return;
        loader.classList.add('animate__animated', 'animate__fadeOut');
        window.setTimeout(() => {
            loader.style.display = 'none';
        }, 350);
    });

    const wrapper = document.querySelector('.auth-form-wrapper');
    if (wrapper) {
        wrapper.setAttribute('data-aos', 'fade-up');
        wrapper.setAttribute('data-aos-duration', '420');
        wrapper.setAttribute('data-aos-once', 'true');
    }

    if (window.AOS) {
        window.AOS.init({
            once: true,
            offset: 8,
            easing: 'ease-out-cubic',
            duration: 420,
            disable: window.matchMedia('(prefers-reduced-motion: reduce)').matches
        });
    }
})();
</script>
</html>
