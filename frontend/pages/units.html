<h1>Units</h1>
<p class="page-intro">Maintain a clean list of measurement units used across raw materials and finished products.</p>

<div class="page-layout-2col">
    <div class="page-sidebar-col">
        {{formSection}}
    </div>

    <div class="page-table-col">
        <section class="section-card table-card">
            <div class="section-head">
                <h2>Unit list</h2>
                <p>Reusable units of measure for all operations.</p>
            </div>
            <div class="table-wrap">
                <table class="data-table">
                    <tr><th>ID</th><th>Name</th><th>Actions</th></tr>
                    {{rows}}
                </table>
            </div>
        </section>
    </div>
</div>
