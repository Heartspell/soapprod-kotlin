<h1>Production Requests</h1>
<p class="page-intro">Submit production requests to automatically process raw material checks, procurement, production, and sales through the full workflow pipeline.</p>

<div class="page-layout-2col">
    <div class="page-sidebar-col">
        {{formSection}}
    </div>

    <div class="page-table-col">
        <section class="section-card">
            <div class="section-head">
                <h2>Request history</h2>
                <p>All submitted production requests with their current processing status.</p>
            </div>
            <div
                class="req-cards-list"
                id="production-request-cards"
                data-refresh-url="/production-requests/cards"
                data-refresh-signature="{{requestCardsSignature}}"
            >
                {{requestCards}}
            </div>
        </section>
    </div>
</div>

<script>
(() => {
    const list = document.getElementById('production-request-cards');
    if (!list) return;

    const refreshUrl = list.dataset.refreshUrl;
    let currentSignature = list.dataset.refreshSignature || '';
    let isRefreshing = false;

    const refresh = async () => {
        if (isRefreshing) return;
        isRefreshing = true;
        try {
            const response = await fetch(refreshUrl, {
                credentials: 'same-origin',
                headers: { 'X-Requested-With': 'XMLHttpRequest' },
                cache: 'no-store'
            });
            if (!response.ok) return;
            const payload = await response.json();
            const nextSignature = String(payload.signature || '');
            if (nextSignature && nextSignature !== currentSignature) {
                list.innerHTML = String(payload.html || '');
                currentSignature = nextSignature;
                list.dataset.refreshSignature = nextSignature;
            }
        } catch (_error) {
        } finally {
            isRefreshing = false;
        }
    };

    const intervalId = window.setInterval(refresh, 2000);
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
            void refresh();
        }
    });
    window.addEventListener('beforeunload', () => {
        window.clearInterval(intervalId);
    });

    void refresh();
})();
</script>
