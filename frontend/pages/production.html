            <div class="section-head">
                <h2>Production history</h2>

            </div>
            <div class="table-wrap">
                <table border="1" cellpadding="4" cellspacing="0">
                    <tr><th>Date</th><th>Product</th><th>Qty</th><th>Employee</th><th>Actions</th></tr>
                    {{rows}}
                </table>
            </div>
        </section>
    </div>
</div>
