services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: soapprod-mssql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Admin@123456"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - ./SoapProduction.bak:/var/opt/mssql/backup/SoapProduction.bak
      - ./db/init/soapproduction-procedures.sql:/var/opt/mssql/backup/soapproduction-procedures.sql:ro
      - ./data/mssql:/var/opt/mssql/data
